name: Update public economic data

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pandas statsmodels scikit-learn
      - run: python scripts/update_cpi.py
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
      - run: python scripts/update_wages.py
      - run: python scripts/update_oil_macro_data.py
      - run: python models/oil_pass_through_local_projection.py
      - run: python models/oil_pass_through_var.py
      - run: python models/train_oil_cpi_gbdt.py
      - name: Commit updated data
        run: |
          git config user.name "localinflation-bot"
          git config user.email "bot@example.com"
          git add data/generated data/metros.json data/config/cpi_series.json
          git commit -m "Update economic data" || echo "No changes"
          git push
